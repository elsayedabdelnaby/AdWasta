# AdWasta — local & publish-ready stack
# Usage: cp .env.example .env && docker compose up --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketing_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketing_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://localhost:8888/
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    ports:
      - "8888:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # App traffic MUST go through the non-superuser app_user role — a superuser
      # silently bypasses every RLS policy (tenant isolation AND per-tenant caps).
      DATABASE_URL: postgresql://app_user:app_user@db:5432/marketing_agent
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@db:5432/marketing_agent
      REDIS_URL: redis://redis:6379
      SEARXNG_URL: http://searxng:8080
      HOST: 0.0.0.0
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app_user:app_user@db:5432/marketing_agent
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@db:5432/marketing_agent
      REDIS_URL: redis://redis:6379
    command: ["node", "-e", "console.log('BullMQ worker — wire in Phase 0 queue'); setInterval(() => {}, 60000)"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
