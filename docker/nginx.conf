server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Re-resolve the api hostname via Docker's embedded DNS instead of caching
        # the IP at startup — otherwise recreating the api container leaves nginx
        # proxying to a stale address (502 until web is restarted). Using a
        # variable in proxy_pass forces per-request resolution.
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:3001;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
